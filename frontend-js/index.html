<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Capstone TicTacToe - Native WebSockets</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div id="app">
      <!-- 1. Pantalla de Login -->
      <div id="login-screen" class="screen">
        <h2>Ingresar a la Red</h2>
        <input type="text" id="username" placeholder="Tu Username..." />
        <input type="password" id="password" placeholder="Tu Contraseña..." />
        <button id="btn-login">Conectar</button>
      </div>

      <!-- 2. Pantalla Lobby -->
      <div id="lobby-screen" class="screen" style="display: none;">
        <h2>Jugadores Online</h2>
        <ul id="user-list"></ul>
      </div>

      <!-- 3. Pantalla de Juego -->
      <div id="game-screen" class="screen" style="display: none;">
        <h2 id="game-status">Preparando tablero...</h2>
        <div id="board" class="board">
          <div class="cell" data-index="0"></div>
          <div class="cell" data-index="1"></div>
          <div class="cell" data-index="2"></div>
          <div class="cell" data-index="3"></div>
          <div class="cell" data-index="4"></div>
          <div class="cell" data-index="5"></div>
          <div class="cell" data-index="6"></div>
          <div class="cell" data-index="7"></div>
          <div class="cell" data-index="8"></div>
        </div>
        <button id="btn-leave" style="margin-top: 20px;">Abandonar Partida</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
